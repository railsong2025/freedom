## 数据优先级

- Buffett 工作流的结构化行情数据源只允许 financeBusiness MCP；新闻、公告、
  网页、PDF、情绪、反证和板块事件按下列规则使用新闻/网页源。
- Zeus 必须同时调用 `mcp__financeBusiness__StockCurrentMarket` 与
  `mcp__financeBusiness__StockMarketList`，并做 financeBusiness 当前/历史
  内部核验。
- 新闻、公告、网页、PDF、情绪、反证、关键人物讲话和板块事件必须恢复使用
  aiwebsearch、官方网页、兼容 WebSearch 和 PDF 抽取；financeBusiness 负责
  行情/价格/成交量/FX/P&L/估值价格输入，新闻源负责事件链和反证。不得用新闻
  或网页补齐 financeBusiness 缺失的行情字段。
- 投资关键价格、估值和仓位不得用外部来源核验；若 financeBusiness
  缺失、过旧或内部冲突，标记不可用于当前 BUY/SELL。

## AI 产业链

涉及 AI、半导体、存储/HBM、PCB/CCL、先进封装、光模块、服务器、数据中心、云 CAPEX 或 AI 应用时，必须拆分供应链位置、直接/间接受益、利润池、定价权、订单能见度、库存、产能、客户集中、出口管制和替代风险。PCB、存储、半导体等上游环节必须分别给出波段资金建议和长期背景判断。

## 安全

- 投资输出仅为建议。
- 单一股票最高仓位 25%。
- API key 只能来自环境变量。
- 本地中文 Markdown 和 `local_result_snapshot.json` 是审计轨迹；SQLite 只作为只读 legacy 背景。
